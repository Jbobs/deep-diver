<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Deep Drop - Debug Version</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        body { background-color: #08090c; color: #e2e8f0; font-family: sans-serif; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #debug-log { position: absolute; top: 10px; left: 10px; right: 10px; max-height: 120px; background: rgba(0,0,0,0.85); color: #00e5ff; font-family: monospace; font-size: 11px; padding: 8px; border-radius: 6px; overflow-y: auto; z-index: 9999; border: 1px solid #333; pointer-events: none; }
        #game-container { position: relative; width: 100%; max-width: 440px; height: 100%; max-height: 850px; background: #111318; display: flex; flex-direction: column; border: 4px solid #232733; border-radius: 16px; }
        #ui-top { display: flex; justify-content: space-between; padding: 12px 16px; background: #0b0c10; font-size: 13px; font-weight: bold; }
        #canvas-wrapper { flex: 1; position: relative; background: #030406; }
        canvas { display: block; width: 100%; height: 100%; }
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(8, 9, 12, 0.97); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; }
        .hidden { display: none !important; }
        h1 { font-size: 34px; color: #ff9f43; margin-bottom: 20px; }
        .mode-btn { width: 90%; padding: 16px; font-size: 15px; font-weight: bold; border-radius: 12px; border: 2px solid #ffca28; cursor: pointer; color: #fff; background: #1f232e; margin-bottom: 10px; text-align: center; }
    </style>
</head>
<body>

<!-- 画面上部にエラーや動作ログをリアルタイム表示する枠 -->
<div id="debug-log">【システムログ】専用コード起動完了<br></div>

<div id="game-container">
    <div id="ui-top">
        <div>DEPTH: <span id="ui-depth">0</span>m</div>
        <div style="color: #ffd700;">🪙 <span id="ui-coins">0</span></div>
    </div>
    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    
    <!-- スタート画面 -->
    <div id="screen-start" class="overlay">
        <h1>DEEP DROP</h1>
        <div class="mode-btn" id="btn-mode-single">🚶 1人プレイではじめる</div>
        <div class="mode-btn" id="btn-mode-multi" style="border-color:#00e5ff;">👥 2人オンライン通信プレイ</div>
    </div>
</div>

<script>
// ログ出力用関数
function log(msg) {
    const logBox = document.getElementById('debug-log');
    if (logBox) {
        logBox.innerHTML += `> ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }
}

window.onerror = function(message, source, lineno, colno, error) {
    log(`エラー発生: ${message} (行:${lineno})`);
    return false;
};

log("プログラムの読み込みを開始します...");

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
let gameState = 'START';

// 画面サイズ調整
function resizeCanvas() {
    canvas.width = canvas.parentElement.clientWidth;
    canvas.height = canvas.parentElement.clientHeight;
    log(`キャンバスサイズ確定: ${canvas.width}x${canvas.height}`);
}

// ゲーム開始処理
function startGame(mode) {
    log(`startGame関数が呼び出されました。モード: ${mode}`);
    try {
        gameState = 'PLAYING';
        document.getElementById('screen-start').classList.add('hidden');
        log("画面の非表示に成功。ループを開始します。");
        requestAnimationFrame(loop);
    } catch(e) {
        log(`ゲーム開始エラー: ${e.message}`);
    }
}

function update() {
    // 動作確認のため最低限の更新処理
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ffca28';
    ctx.fillRect(50, 50, 40, 40); // テスト用の四角形
}

function loop() {
    update();
    draw();
    if (gameState === 'PLAYING') requestAnimationFrame(loop);
}

// イベントリスナー登録
try {
    const singleBtn = document.getElementById('btn-mode-single');
    log("1人プレイボタンを取得しました。イベントを設定します。");
    
    // スマホのタップとクリック両方に対応
    singleBtn.addEventListener('click', (e) => {
        log("1人プレイボタンが【クリック】されました");
        startGame('SINGLE');
    });
    singleBtn.addEventListener('touchstart', (e) => {
        log("1人プレイボタンが【タッチ】されました");
        startGame('SINGLE');
    });

    document.getElementById('btn-mode-multi').addEventListener('click', () => {
        log("2人プレイボタンがクリックされました");
        startGame('MULTI');
    });
} catch(e) {
    log(`ボタン設定エラー: ${e.message}`);
}

window.addEventListener('resize', resizeCanvas);
window.onload = () => {
    log("window.onload が実行されました");
    resizeCanvas();
    draw();
};
</script>
</body>
</html>
