<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>DEEP DROP</title>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
        body { background-color: #000; color: #fff; font-family: monospace; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        #game-container { position: relative; width: 100%; max-width: 440px; height: 100%; max-height: 850px; background: #000; display: flex; flex-direction: column; }
        
        #ui-top { display: flex; justify-content: space-between; padding: 16px; background: #000; font-size: 14px; letter-spacing: 1px; }
        .ui-box { background: rgba(255,255,255,0.05); padding: 6px 12px; border: 1px solid #333; border-radius: 4px; }
        
        #canvas-wrapper { flex: 1; position: relative; background: #000; overflow: hidden; }
        /* 各種ブラウザ用のぼやけ防止CSSを徹底強化 */
        canvas { 
            display: block; width: 100%; height: 100%; 
            image-rendering: -moz-crisp-edges;
            image-rendering: -webkit-crisp-edges;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        
        #controls { display: flex; height: 90px; background: #000; padding: 10px; gap: 10px; }
        .btn { flex: 1; display: flex; justify-content: center; align-items: center; background: #111; font-size: 16px; color: #aaa; border: 1px solid #333; border-radius: 6px; cursor: pointer; }
        .btn:active { background: #222; color: #fff; }
        
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 10; text-align: center; padding: 20px; }
        .hidden { display: none !important; }
        
        .overlay h1 { font-size: 36px; color: #ffd700; margin-bottom: 8px; letter-spacing: 4px; font-weight: normal; }
        .overlay p { font-size: 12px; margin-bottom: 24px; color: #888; }
        
        .mode-menu { display: flex; flex-direction: column; gap: 12px; width: 85%; }
        .mode-btn { padding: 14px; font-size: 14px; border: 1px solid #444; border-radius: 6px; cursor: pointer; color: #fff; background: #111; }
        
        .char-selector-title { font-size: 11px; color: #ffd700; margin-bottom: 8px; text-align: left; width: 85%; letter-spacing: 1px; }
        .char-scroll-box { display: flex; gap: 8px; width: 85%; overflow-x: auto; padding: 10px 0; margin-bottom: 20px; }
        .char-card { flex: 0 0 90px; padding: 10px 4px; border: 1px solid #333; background: #111; border-radius: 6px; cursor: pointer; text-align: center; }
        .char-card.selected { border-color: #ffd700; background: #222; }
        .char-card.locked { opacity: 0.2; cursor: not-allowed; }
        .char-dot { font-size: 16px; margin-bottom: 4px; }
        .char-name { font-size: 11px; color: #fff; }
        
        .overlay button.main-action { padding: 14px; font-size: 14px; background: #ffd700; color: #000; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 85%; margin-top: 8px; letter-spacing: 1px; }
        .overlay button.btn-secondary { background: #222; color: #aaa; border: 1px solid #444; border-radius: 6px; padding: 10px; cursor: pointer; margin-top: 16px; font-size: 12px; width: 60%; }
        
        .online-panel { background: #111; border: 1px solid #333; border-radius: 6px; padding: 12px; width: 85%; margin-bottom: 12px; text-align: left; }
        .online-title { font-size: 11px; color: #ffd700; margin-bottom: 6px; }
        .id-display { background: #000; color: #00e5ff; padding: 8px; font-size: 12px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: #333; color: #fff; border: none; padding: 4px 8px; font-size: 10px; cursor: pointer; border-radius: 2px; }
        .online-input { width: 100%; padding: 8px; font-size: 12px; background: #000; color: #fff; border: 1px solid #333; border-radius: 4px; margin-bottom: 8px; }
        .connect-btn { width: 100%; padding: 8px; background: #00e5ff; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        .status-text { font-size: 11px; color: #ff9f43; margin-bottom: 10px; }
    </style>
</head>
<body>
<div id="game-container">
    <div id="ui-top">
        <div class="ui-box">DEPTH: <span id="ui-depth">0</span>m / 500m</div>
        <div class="ui-box" style="color: #ffd700;">🪙 <span id="ui-coins">0</span></div>
        <div class="ui-box">HI-SCORE: <span id="ui-high">0</span>m</div>
    </div>
    <div id="canvas-wrapper">
        <canvas id="gameCanvas"></canvas>
    </div>
    <div id="controls">
        <div class="btn" id="btn-left">◀ LEFT</div>
        <div class="btn" id="btn-right">RIGHT ▶</div>
    </div>
    
    <div id="screen-start" class="overlay">
        <div style="font-size:30px; margin-bottom:4px;">👑</div>
        <h1>DEEP DROP</h1>
        <p>正解ルートを掘り進み、500mの最深部を目指せ！</p>
        <div class="mode-menu" id="mode-selection-group">
            <div class="mode-btn" id="btn-mode-single">🚶 1人プレイではじめる</div>
            <div class="mode-btn" id="btn-mode-multi">👥 2人オンライン通信プレイ</div>
        </div>
        <div id="single-setup-area" class="hidden" style="width:100%; flex-direction:column; align-items:center;">
            <div class="char-selector-title">EXPLORER SELECT（深度報酬で解放）</div>
            <div class="char-scroll-box" id="char-container"></div>
            <button id="start-single-btn" class="main-action">START SINGLE GAME</button>
            <button class="btn-secondary back-to-menu-btn">◀ モード選択に戻る</button>
        </div>
        <div id="multi-setup-area" class="hidden" style="width:100%; flex-direction:column; align-items:center;">
            <div class="online-panel">
                <div class="online-title">① 自分の接続ID</div>
                <div class="id-display"><span id="my-id">Loading ID...</span><button class="copy-btn" id="btn-copy">COPY</button></div>
            </div>
            <div class="online-panel">
                <div class="online-title">② 友達のIDを入力</div>
                <input type="text" class="online-input" id="peer-id-input" placeholder="相手のIDをペースト">
                <button class="connect-btn" id="btn-connect">CONNECT</button>
            </div>
            <div class="status-text" id="connection-status">通信準備中...</div>
            <button id="start-multi-btn" class="main-action" disabled>START MULTI GAME</button>
            <button class="btn-secondary back-to-menu-btn">◀ モード選択に戻る</button>
        </div>
    </div>
    
    <div id="screen-gameover" class="overlay hidden">
        <h1 style="color:#ff4444;">GAME OVER</h1>
        <p>到達深度: <span id="result-depth">0</span>m</p>
        <button id="restart-button" class="main-action">RETRY</button>
        <button id="home-button" class="btn-secondary">BACK TO MENU</button>
    </div>
    <div id="screen-clear" class="overlay hidden">
        <h1 style="color:#ffd700;">STAGE CLEAR!</h1>
        <button id="clear-home-button" class="main-action">BACK TO MENU</button>
    </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d');
const COLS = 14; const TILE_SIZE = 30;
let map = []; let items = []; let generatedMaxY = 0; let truePathX = 7;

const CHARACTERS = [
    { id: 'yellow', name: 'イエロー', color: '#ffd700', req: 0 },
    { id: 'aqua', name: 'アクア', color: '#00e5ff', req: 50 },
    { id: 'emerald', name: 'エメラルド', color: '#00e676', req: 150 },
    { id: 'pink', name: 'ピンク', color: '#ff8da1', req: 300 }
];
let activeCharId = 'yellow'; let highScore = 0; let totalCoins = 0;
let currentMode = 'SINGLE'; let peer = null, conn = null; let isHost = false;

let p1 = { x: 7, y: 2, subX: 7 * TILE_SIZE + 4, subY: 2 * TILE_SIZE, width: TILE_SIZE - 8, height: TILE_SIZE - 8, speed: 4, isFalling: false, dead: false, flashlightTimer: 0 };
let p2 = { x: 7, y: 2, subX: 7 * TILE_SIZE + 4, subY: 2 * TILE_SIZE, width: TILE_SIZE - 8, height: TILE_SIZE - 8, speed: 4, isFalling: false, dead: false, flashlightTimer: 0 };
let gameState = 'START'; let mobileLeftPressed = false, mobileRightPressed = false;
let cameraY = 0;

function getLayerStyle(y) {
    let d = Math.floor(y / 2);
    if(d < 100) return { bg: '#05070a', wall: '#2c3545', name: '岩石遺跡層' };
    if(d < 200) return { bg: '#020813', wall: '#1e40af', name: '深海大氷壁' };
    if(d < 300) return { bg: '#140303', wall: '#991b1b', name: '煉獄灼熱層' };
    if(d < 400) return { bg: '#13113c', wall: '#5b21b6', name: '妖光水晶層' };
    return { bg: '#090d16', wall: '#334155', name: '最深崩落界' };
}

function initMap() {
    map = []; items = []; generatedMaxY = 0; truePathX = 7; cameraY = 0;
    for (let y = 0; y < 6; y++) { map[y] = new Array(COLS).fill(0); }
    
    for (let y = 6; y < 60; y++) {
        map[y] = new Array(COLS).fill(0);
        for (let x = 0; x < COLS; x++) {
            if (x === 0 || x === COLS - 1) { map[y][x] = 1; }
            else if (Math.random() < 0.45) { map[y][x] = 1; }
        }
        if (y % 3 === 0) {
            truePathX = Math.max(1, Math.min(COLS - 2, truePathX + (Math.random() < 0.5 ? -1 : 1)));
        }
        map[y][truePathX] = 0;
        if (map[y-1]) map[y-1][truePathX] = 0;
        
        if(y % 5 === 0 && Math.random() < 0.3) items.push({ x: Math.floor(Math.random()*(COLS-2))+1, y: y, type: 'coin' });
        if(y % 8 === 0 && Math.random() < 0.1) items.push({ x: Math.floor(Math.random()*(COLS-2))+1, y: y, type: 'light' });
    }
    generatedMaxY = 60;
    p1.subX = 7 * TILE_SIZE + 4; p1.subY = 2 * TILE_SIZE; p1.dead = false; p1.flashlightTimer = 0;
    p2.subX = 8 * TILE_SIZE + 4; p2.subY = 2 * TILE_SIZE; p2.dead = false; p2.flashlightTimer = 0;
}

function extendMap() {
    let targetY = generatedMaxY + 40;
    for (let y = generatedMaxY; y < targetY; y++) {
        map[y] = new Array(COLS).fill(0);
        for (let x = 0; x < COLS; x++) {
            if (x === 0 || x === COLS - 1) { map[y][x] = 1; }
            else if (Math.random() < 0.45) { map[y][x] = 1; }
        }
        if (y % 3 === 0) {
            truePathX = Math.max(1, Math.min(COLS - 2, truePathX + (Math.random() < 0.5 ? -1 : 1)));
        }
        map[y][truePathX] = 0;
        if (map[y-1]) map[y-1][truePathX] = 0;

        if(y % 6 === 0 && Math.random() < 0.3) items.push({ x: Math.floor(Math.random()*(COLS-2))+1, y: y, type: 'coin' });
        if(y % 9 === 0 && Math.random() < 0.12) items.push({ x: Math.floor(Math.random()*(COLS-2))+1, y: y, type: 'light' });
    }
    generatedMaxY = targetY;
}

function update() {
    if (gameState !== 'PLAYING') return;
    let me = (currentMode === 'SINGLE' || isHost) ? p1 : p2;

    let nextY = me.subY + 6;
    let onFloor = false;
    let gridY = Math.floor((nextY + me.height) / TILE_SIZE);
    let pL = Math.floor((me.subX + 4) / TILE_SIZE); 
    let pR = Math.floor((me.subX + me.width - 4) / TILE_SIZE);

    if (map[gridY] && (map[gridY][pL] === 1 || map[gridY][pR] === 1)) { onFloor = true; }

    if (!onFloor) { 
        me.isFalling = true; me.subY = nextY; 
    } else { 
        me.isFalling = false; me.subY = Math.floor(me.subY / TILE_SIZE) * TILE_SIZE; 
    }

    let moveDir = 0;
    if (mobileLeftPressed) moveDir = -1;
    if (mobileRightPressed) moveDir = 1;
    if (moveDir !== 0) {
        let nextX = me.subX + moveDir * me.speed;
        let checkY1 = Math.floor(me.subY / TILE_SIZE);
        let checkY2 = Math.floor((me.subY + me.height - 1) / TILE_SIZE);
        let checkX = moveDir === -1 ? Math.floor(nextX / TILE_SIZE) : Math.floor((nextX + me.width) / TILE_SIZE);

        if (map[checkY1] && map[checkY1][checkX] !== 1 && map[checkY2] && map[checkY2][checkX] !== 1) {
            me.subX = nextX;
        }
    }

    if (me.flashlightTimer > 0) me.flashlightTimer--;

    let myTileX = Math.floor((me.subX + me.width/2)/TILE_SIZE);
    let myTileY = Math.floor((me.subY + me.height/2)/TILE_SIZE);
    items = items.filter(it => {
        if(it.x === myTileX && it.y === myTileY) {
            if(it.type === 'coin') { totalCoins += 1; document.getElementById('ui-coins').innerText = totalCoins; }
            if(it.type === 'light') { me.flashlightTimer = 450; }
            return false;
        }
        return true;
    });

    let currentDepth = Math.floor(me.subY / TILE_SIZE / 2);
    document.getElementById('ui-depth').innerText = currentDepth;
    if (currentDepth > highScore) { highScore = currentDepth; document.getElementById('ui-high').innerText = highScore; }

    if (currentDepth >= 500) { gameState = 'CLEAR'; document.getElementById('screen-clear').classList.remove('hidden'); return; }
    if (myTileY + 15 > generatedMaxY) extendMap();

    let targetCamY = Math.floor(me.subY - (canvas.height / (window.devicePixelRatio || 1)) / 3);
    if (targetCamY > cameraY) { cameraY += Math.floor((targetCamY - cameraY) * 0.1) || 1; }

    // 【修正：完全ハマり即死判定】
    // 下が床で、かつ左も右もブロックに完全に挟まれて動けない状態を検知してゲームオーバー
    let curYGrid = Math.floor(me.subY / TILE_SIZE);
    let leftGrid = Math.floor((me.subX - 2) / TILE_SIZE);
    let rightGrid = Math.floor((me.subX + me.width + 2) / TILE_SIZE);
    if (onFloor && map[curYGrid] && map[curYGrid][leftGrid] === 1 && map[curYGrid][rightGrid] === 1) {
        me.dead = true; endGame(); return;
    }

    if (me.subY < cameraY) { me.dead = true; endGame(); return; }

    if (currentMode === 'MULTI' && conn && conn.open) {
        conn.send({ type: 'sync', subX: me.subX, subY: me.subY, dead: me.dead, light: me.flashlightTimer });
    }
}

function endGame() {
    gameState = 'GAMEOVER';
    document.getElementById('result-depth').innerText = document.getElementById('ui-depth').innerText;
    document.getElementById('screen-gameover').classList.remove('hidden');
    renderCharMenu();
}
// キャラクターの姿を描画（すべてのパーツと計算をDPR基準で完全整数化してブラーを除去）
function drawCharacter(x, y, charId, isFacingLeft) {
    let dpr = window.devicePixelRatio || 1;
    ctx.save();
    
    // 描画の基準位置をDPRを掛けたうえで完全にピクセル単位で整数に固定
    let intX = Math.floor(x + p1.width / 2);
    let intY = Math.floor(y + p1.height / 2);
    ctx.translate(intX, intY);
    if (isFacingLeft) ctx.scale(-1, 1);

    let r = Math.floor(p1.width / 2);
    let targetChar = CHARACTERS.find(c => c.id === charId) || CHARACTERS[0];

    // 体を描画
    ctx.fillStyle = targetChar.color;
    ctx.beginPath(); ctx.arc(0, 0, r, 0, Math.PI * 2); ctx.fill();

    if (charId === 'pink') {
        // ピンク（カービィ風）の顔パーツもすべて整数化
        ctx.fillStyle = '#222';
        ctx.fillRect(Math.floor(r * 0.2), Math.floor(-r * 0.3), Math.floor(r * 0.15), Math.floor(r * 0.4));
        ctx.fillRect(Math.floor(r * 0.6), Math.floor(-r * 0.3), Math.floor(r * 0.15), Math.floor(r * 0.4));
        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.floor(r * 0.2), Math.floor(-r * 0.3), Math.floor(r * 0.15), Math.floor(r * 0.15));
        ctx.fillRect(Math.floor(r * 0.6), Math.floor(-r * 0.3), Math.floor(r * 0.15), Math.floor(r * 0.15));
        ctx.fillStyle = '#ff43a1';
        ctx.beginPath(); ctx.arc(Math.floor(r * 0.1), Math.floor(r * 0.1), Math.floor(r * 0.15), 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(Math.floor(r * 0.8), Math.floor(r * 0.1), Math.floor(r * 0.15), 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = '#222'; ctx.lineWidth = 1.5; ctx.beginPath();
        ctx.arc(Math.floor(r * 0.45), Math.floor(r * 0.05), Math.floor(r * 0.12), 0, Math.PI); ctx.stroke();
    } else {
        // 通常スキン（縦目のシンプルな黒ドット）
        ctx.fillStyle = '#000';
        ctx.fillRect(Math.floor(r * 0.2), Math.floor(-r * 0.3), Math.floor(r * 0.15), Math.floor(r * 0.5));
        ctx.fillRect(Math.floor(r * 0.6), Math.floor(-r * 0.3), Math.floor(r * 0.15), Math.floor(r * 0.5));
    }

    ctx.restore();
}

function draw() {
    let me = (currentMode === 'SINGLE' || isHost) ? p1 : p2;
    let style = getLayerStyle(Math.floor(me.subY / TILE_SIZE));
    let dpr = window.devicePixelRatio || 1;
    
    // システム側の補間（アンチエイリアス）を徹底的にカット
    ctx.imageSmoothingEnabled = false;
    ctx.mozImageSmoothingEnabled = false;
    ctx.webkitImageSmoothingEnabled = false;
    ctx.msImageSmoothingEnabled = false;

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = style.bg; ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.save(); 
    ctx.scale(dpr, dpr);
    ctx.translate(0, -Math.floor(cameraY)); // カメラ位置を整数化して背景のガタつきを防止

    // ブロック描画
    for (let y = 0; y < generatedMaxY; y++) {
        if (!map[y]) continue;
        let tStyle = getLayerStyle(y);
        for (let x = 0; x < COLS; x++) {
            if (map[y][x] === 1) { 
                ctx.fillStyle = tStyle.wall; 
                ctx.fillRect(x * TILE_SIZE, y * TILE_SIZE, TILE_SIZE, TILE_SIZE);
            }
        }
    }
    
    items.forEach(it => {
        ctx.font = '16px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(it.type==='coin'?'🪙':'🔦', it.x*TILE_SIZE + TILE_SIZE/2, it.y*TILE_SIZE + TILE_SIZE/2);
    });

    if(!p1.dead) { drawCharacter(p1.subX, p1.subY, activeCharId, mobileLeftPressed); }
    if(currentMode === 'MULTI' && !p2.dead) { drawCharacter(p2.subX, p2.subY, 'aqua', false); }

    ctx.restore();

    // 【最重要修正】視界マスク（暗闇エフェクト）のサイズと座標をDPR基準で完全に整数化（これがブラーの主因でした）
    let baseRadius = me.flashlightTimer > 0 ? 180 : 85;
    let maskCanvas = document.createElement('canvas');
    maskCanvas.width = canvas.width; maskCanvas.height = canvas.height;
    let mctx = maskCanvas.getContext('2d');
    
    mctx.imageSmoothingEnabled = false;
    mctx.webkitImageSmoothingEnabled = false;
    
    mctx.fillStyle = '#000'; mctx.fillRect(0, 0, canvas.width, canvas.height);

    let screenX = Math.floor((me.subX + me.width/2) * dpr);
    let screenY = Math.floor((me.subY + me.height/2 - cameraY) * dpr);
    let radLarge = Math.floor(baseRadius * dpr);
    let radSmall = Math.floor(baseRadius * 0.5 * dpr);

    mctx.globalCompositeOperation = 'destination-out';
    let grad = mctx.createRadialGradient(screenX, screenY, radSmall, screenX, screenY, radLarge);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    mctx.fillStyle = grad; mctx.beginPath(); mctx.arc(screenX, screenY, radLarge, 0, Math.PI*2); mctx.fill();

    ctx.drawImage(maskCanvas, 0, 0);
    
    // UIテキスト表示
    ctx.styleSelection = 'pixelated';
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(Math.floor(10 * dpr), Math.floor(50 * dpr), Math.floor(110 * dpr), Math.floor(24 * dpr));
    ctx.fillStyle = '#fff'; ctx.font = `${Math.floor(11 * dpr)}px sans-serif`; 
    ctx.fillText(`📍 ${style.name}`, Math.floor(16 * dpr), Math.floor(66 * dpr));
}

function loop() { update(); draw(); if (gameState === 'PLAYING') requestAnimationFrame(loop); }

function renderCharMenu() {
    const container = document.getElementById('char-container'); container.innerHTML = '';
    CHARACTERS.forEach(c => {
        let locked = highScore < c.req; let selected = activeCharId === c.id;
        let card = document.createElement('div'); card.className = `char-card ${selected?'selected':''} ${locked?'locked':''}`;
        card.innerHTML = `<div class="char-dot" style="color:${c.color}">●</div><div class="char-name">${c.name}</div><div style="font-size:9px;color:#666;">${c.req===0?'初期':c.req+'m解禁'}</div>`;
        if(!locked) card.onclick = () => { activeCharId = c.id; renderCharMenu(); };
        container.appendChild(card);
    });
}

function initPeer() {
    peer = new Peer();
    peer.on('open', id => { document.getElementById('my-id').innerText = id; });
    peer.on('connection', c => {
        conn = c; isHost = true; setupChatReceiver();
        document.getElementById('connection-status').innerText = '接続完了！(HOST)';
        document.getElementById('start-multi-btn').disabled = false;
    });
}
function setupChatReceiver() {
    conn.on('data', data => {
        if(data.type === 'sync') {
            let op = isHost ? p2 : p1; op.subX = data.subX; op.subY = data.subY; op.dead = data.dead; op.flashlightTimer = data.light;
        }
        if(data.type === 'start') {
            currentMode = 'MULTI'; initMap(); gameState = 'PLAYING';
            document.getElementById('screen-start').classList.add('hidden');
            requestAnimationFrame(loop);
        }
    });
}

document.getElementById('btn-mode-single').onclick = () => {
    document.getElementById('mode-selection-group').classList.add('hidden');
    document.getElementById('single-setup-area').classList.remove('hidden');
    document.getElementById('single-setup-area').style.display = 'flex';
    renderCharMenu();
};
document.getElementById('start-single-btn').onclick = () => {
    currentMode = 'SINGLE'; initMap(); gameState = 'PLAYING';
    document.getElementById('screen-start').classList.add('hidden');
    requestAnimationFrame(loop);
};
document.getElementById('btn-mode-multi').onclick = () => {
    document.getElementById('mode-selection-group').classList.add('hidden');
    document.getElementById('multi-setup-area').classList.remove('hidden');
    document.getElementById('multi-setup-area').style.display = 'flex';
    if(!peer) initPeer();
};
document.getElementById('btn-connect').onclick = () => {
    let target = document.getElementById('peer-id-input').value;
    if(!target) return; document.getElementById('connection-status').innerText = '接続中...';
    conn = peer.connect(target); isHost = false;
    conn.on('open', () => {
        document.getElementById('connection-status').innerText = '接続完了！(GUEST)';
        setupChatReceiver();
    });
};
document.getElementById('start-multi-btn').onclick = () => {
    conn.send({ type: 'start' }); currentMode = 'MULTI'; initMap(); gameState = 'PLAYING';
    document.getElementById('screen-start').classList.add('hidden');
    requestAnimationFrame(loop);
};
document.querySelectorAll('.back-to-menu-btn').forEach(b => {
    b.onclick = () => {
        document.getElementById('single-setup-area').classList.add('hidden');
        document.getElementById('single-setup-area').style.display = 'none';
        document.getElementById('multi-setup-area').classList.add('hidden');
        document.getElementById('multi-setup-area').style.display = 'none';
        document.getElementById('mode-selection-group').classList.remove('hidden');
    };
});
const goHome = () => {
    document.getElementById('screen-gameover').classList.add('hidden');
    document.getElementById('screen-clear').classList.add('hidden');
    document.getElementById('screen-start').classList.remove('hidden');
    document.getElementById('single-setup-area').classList.add('hidden');
    document.getElementById('single-setup-area').style.display = 'none';
    document.getElementById('multi-setup-area').classList.add('hidden');
    document.getElementById('multi-setup-area').style.display = 'none';
    document.getElementById('mode-selection-group').classList.remove('hidden');
    gameState = 'START'; draw();
};
document.getElementById('home-button').onclick = goHome;
document.getElementById('clear-home-button').onclick = goHome;
document.getElementById('restart-button').onclick = () => {
    document.getElementById('screen-gameover').classList.add('hidden');
    initMap(); gameState = 'PLAYING'; requestAnimationFrame(loop);
};
document.getElementById('btn-copy').onclick = () => {
    navigator.clipboard.writeText(document.getElementById('my-id').innerText);
    alert('IDをコピーしました！');
};

const bindBtn = (id, action) => {
    let el = document.getElementById(id);
    el.addEventListener('touchstart', e => { e.preventDefault(); action(true); });
    el.addEventListener('touchend', () => action(false));
};
bindBtn('btn-left', v => mobileLeftPressed = v);
bindBtn('btn-right', v => mobileRightPressed = v);

function resizeCanvas() { 
    let dpr = window.devicePixelRatio || 1;
    let rect = canvas.parentElement.getBoundingClientRect();
    canvas.width = Math.floor(rect.width * dpr); 
    canvas.height = Math.floor(rect.height * dpr);
    canvas.style.width = rect.width + 'px';
    canvas.style.height = rect.height + 'px';
    draw();
}
window.addEventListener('resize', resizeCanvas);
window.onload = () => { resizeCanvas(); initMap(); draw(); };
</script>
</body>
</html>
